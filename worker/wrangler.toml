name = "oct-worker"
main = "src/index.ts"
compatibility_date = "2024-01-17"

# Custom domain: https://oct.sereniblue.com
# Route must be bound in Cloudflare dashboard or via:
#   wrangler routes add --pattern "oct.sereniblue.com/*" --script oct-worker
# Or add DNS record + custom domain binding in Cloudflare dashboard.
routes = [{ pattern = "oct.sereniblue.com", custom_domain = true }]

[[kv_namespaces]]
binding = "OCT_KV"
id = "e2dae291d0ba4425881d10215db79e56"
preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"
